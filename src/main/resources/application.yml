spring:
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: jdbc:postgresql://localhost:5432/portfolioBackend_DB
    username: ${DB_USER:}
    password: ${DB_PASSWORD:}
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate.default_schema: portfolioBackend_schema
      hibernate.hbm2ddl.create_namespaces: true
    open-in-view: false
    show-sql: false

  mail:
    host: smtp.gmail.com
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      "[mail.smtp.auth]": true
      "[mail.smtp.starttls.enable]": true
      "[mail.smtp.starttls.required]": true
      "[mail.smtp.connectiontimeout]": 5000
      "[mail.smtp.timeout]": 5000
      "[mail.smtp.writetimeout]": 5000

management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

security:
  permit-all: /auth/login,/auth/register,/auth/forgot-password,/auth/reset-password,/auth/verify-email,/auth/verify-email/request,/health,/info

app:
  jwt:
    secret: ${APP_JWT_SECRET}
  deepseek:
    api-key: ${APP_DEEPSEEK_API_KEY:}
    base-url: ${APP_DEEPSEEK_BASE_URL:https://api.deepseek.com}
    model: ${APP_DEEPSEEK_MODEL:deepseek-chat}
  mail:
    from: ${MAIL_FROM:${MAIL_USERNAME}}
    replyTo: ${MAIL_REPLY_TO:}
  notifications:
    owner-email: ${APP_OWNER_NOTIFICATION_EMAIL:oscarpear99@gmail.com}
  seed:
    username: ${SEED_USERNAME}
    email: ${SEED_EMAIL}
    password: ${SEED_PASSWORD}
  verify-email:
    backend-verify-url: ${APP_VERIFY_EMAIL_BACKEND_URL:http://localhost:8080/auth/verify-email}
    frontend-success-url: ${APP_VERIFY_EMAIL_SUCCESS_URL:https://oscarpelegrina.com/demos/1?emailVerified=1}
    frontend-error-url: ${APP_VERIFY_EMAIL_ERROR_URL:https://oscarpelegrina.com/demos/1?emailVerifyError=1}
